<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SenseFlow — Sensorisk test</title>
<style>
:root{--bg:#e8d8cc;--surf:#f0e4da;--surf2:#e2d0c4;--brd:#cebdaf;--txt:#2a2018;--mut:#7a6555;--acc:#3d5a52;--acc2:#4d6e65;--adim:rgba(61,90,82,0.14);--adim2:rgba(61,90,82,0.22);--warm:#b07030;--warmdim:rgba(176,112,48,0.14);--dan:#c05428;--dandim:rgba(192,84,40,0.14);--rad:10px;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px}
.wrap{width:100%;max-width:520px;margin:0 auto}
.logo{text-align:center;padding:24px 0 16px;font-size:1.3rem;font-weight:700;color:var(--acc)}
.logo span{color:var(--warm)}
.logo small{display:block;font-size:.72rem;color:var(--mut);font-weight:400;margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--rad);padding:22px;margin-bottom:14px;box-shadow:0 2px 8px rgba(42,32,24,0.07)}
.btn{display:block;width:100%;padding:13px;border-radius:8px;border:none;cursor:pointer;font-size:15px;font-weight:600;font-family:inherit;transition:all .13s;text-align:center}
.btn-p{background:var(--acc);color:#fff}.btn-p:active{background:var(--acc2)}
.btn-o{background:transparent;border:1.5px solid var(--brd);color:var(--mut)}.btn-o:active{border-color:var(--acc);color:var(--acc)}
.btn-row{display:flex;gap:10px;margin-top:14px}
.btn-row .btn{flex:1}
label{display:block;font-size:.72rem;font-weight:600;color:var(--mut);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
input[type=text],input[type=number],textarea,select{width:100%;padding:11px 13px;border:1px solid var(--brd);border-radius:8px;background:var(--surf2);font-size:14px;color:var(--txt);outline:none;transition:border .13s;font-family:inherit;margin-bottom:12px}
input:focus,textarea:focus,select:focus{border-color:var(--acc)}
textarea{resize:vertical;min-height:80px}
.pbar{height:5px;background:var(--brd);border-radius:3px;margin-bottom:20px;overflow:hidden}
.pfill{height:100%;background:var(--acc);border-radius:3px;transition:width .4s}
.scode{font-size:5rem;font-weight:700;text-align:center;color:var(--acc);line-height:1;margin:16px 0 6px;letter-spacing:.06em}
.slbl{text-align:center;color:var(--mut);font-size:.84rem;margin-bottom:22px}
.stit{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin-bottom:9px;display:block}
.scr{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:7px}
.scb{width:46px;height:46px;border-radius:8px;border:1.5px solid var(--brd);background:var(--surf2);font-size:16px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;color:var(--mut);display:flex;align-items:center;justify-content:center}
.scb:active{transform:scale(.95)}
.scb.on{background:var(--acc);border-color:var(--acc);color:#fff;transform:scale(1.1);box-shadow:0 0 0 3px rgba(61,90,82,0.2)}
.sclb{display:flex;justify-content:space-between;font-size:.68rem;color:var(--mut);margin-bottom:7px}
.lk-fb{text-align:center;min-height:32px;margin-bottom:16px}
.lk-badge{display:inline-flex;align-items:center;gap:6px;background:var(--adim2);color:var(--acc);border-radius:8px;padding:6px 16px;font-size:.85rem;font-weight:600;border:1px solid rgba(61,90,82,0.2)}
.cata-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:18px}
.chip{padding:9px 12px;border-radius:8px;border:1.5px solid var(--brd);background:var(--surf2);cursor:pointer;font-size:.82rem;font-weight:600;text-align:center;color:var(--mut);transition:all .12s}
.chip:active{transform:scale(.97)}
.chip.on{background:var(--acc);border-color:var(--acc);color:#fff}
.jr{display:flex;gap:4px;justify-content:center;margin-bottom:4px;flex-wrap:wrap}
.jb{flex:1;min-width:55px;max-width:90px;padding:10px 4px;border-radius:7px;border:1px solid var(--brd);background:var(--surf2);cursor:pointer;font-size:.7rem;font-weight:600;text-align:center;transition:all .12s;font-family:inherit;color:var(--mut)}
.jb.jlo{border-color:var(--dan);background:var(--dandim);color:var(--dan)}
.jb.jja{border-color:var(--acc);background:var(--adim);color:var(--acc)}
.jb.jhi{border-color:var(--dan);background:var(--dandim);color:var(--dan)}
.jlb{display:flex;justify-content:space-between;font-size:.65rem;color:var(--mut);margin-bottom:16px}
.pb-opt{display:block;width:100%;text-align:left;padding:12px 16px;border:1.5px solid var(--brd);border-radius:8px;background:var(--surf2);cursor:pointer;font-size:.9rem;margin-bottom:8px;transition:all .12s;font-family:inherit;color:var(--txt)}
.pb-opt.on{border-color:var(--acc);background:var(--adim);font-weight:600}
.info-box{border-left:3px solid var(--acc);background:var(--adim);border-radius:0 8px 8px 0;padding:10px 14px;font-size:.82rem;color:var(--acc);margin-bottom:14px;line-height:1.6}
.err{text-align:center;padding:40px 20px}
.err-icon{font-size:3.5rem;margin-bottom:12px}
.loader{text-align:center;padding:40px 20px;color:var(--mut)}
.spin{display:inline-block;width:32px;height:32px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.mundrens-overlay{display:none;position:fixed;inset:0;background:rgba(42,32,24,0.55);z-index:50;align-items:center;justify-content:center;padding:16px}
.mundrens-overlay.on{display:flex}
.mundrens-box{background:var(--surf);border-radius:var(--rad);padding:28px;max-width:380px;width:100%;text-align:center;border:1.5px solid var(--warm)}
.mr-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin:12px 0 18px}
.mr-chip{background:var(--adim);color:var(--acc);border:1px solid rgba(61,90,82,0.25);border-radius:20px;padding:5px 14px;font-size:.82rem;font-weight:600}
.divider{height:1px;background:var(--brd);margin:14px 0}
.done-rows{text-align:left;background:var(--adim);border-radius:8px;padding:14px;margin:16px 0}
.done-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--brd);font-size:.85rem}
.done-row:last-child{border-bottom:none}
.badge-ok{background:var(--adim2);color:var(--acc);border-radius:6px;padding:2px 8px;font-size:.72rem;font-weight:700}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Sense<span>Flow</span><small>Sensorisk testplatform</small></div>
  <div id="app"><div class="loader"><div class="spin"></div><br>Henter fors&#248;gsdata...</div></div>
</div>

<div class="mundrens-overlay" id="mr-ov">
  <div class="mundrens-box">
    <div style="font-size:2.5rem;margin-bottom:10px">&#128167;</div>
    <h3 style="margin-bottom:6px;font-size:1.1rem">Husk mundrens!</h3>
    <p style="font-size:.85rem;color:var(--mut);margin-bottom:4px">Rens munden inden n&#230;ste pr&#248;ve:</p>
    <div class="mr-chips" id="mr-chips"></div>
    <button class="btn btn-p" onclick="lukMundrens()">&#10003; Klar &#8212; forts&#230;t</button>
  </div>
</div>

<script>
// ── KONFIGURATION ──
const GH_USER = 'johanneshlarsen';
const GH_REPO = 'senseflow';
const DATA_FILE = 'sf_data.json';
const RAW_URL = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/${DATA_FILE}`;
const API_URL = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${DATA_FILE}`;

const JL=['Alt for lidt','For lidt','Passende','For meget','Alt for meget'];
const LBL={1:'Kan slet ikke lide',2:'Kan ikke lide',3:'Kan lidt ikke lide',4:'Hverken/eller',5:'Hverken/eller',6:'Kan lidt godt lide',7:'Kan godt lide',8:'Kan rigtig godt lide',9:'Kan rigtig godt lide'};

let forsog=null,deltager=null,ci=0,ts={},vP=null,pendingNext=null;
let allData=null,dataSHA=null;

// Hent token fra localStorage (samme browser som admin — til lokal test)
// eller brug ingen token (read-only via raw.githubusercontent.com)
const TOKEN = localStorage.getItem('sf_token')||'';

async function hentFraGitHub(){
  try{
    // Brug raw URL for hurtig læsning (ingen auth nødvendig)
    const r = await fetch(RAW_URL+'?t='+Date.now());
    if(r.ok){
      allData = await r.json();
      return true;
    }
  }catch(e){}
  return false;
}

async function gemTilGitHub(data){
  if(!TOKEN) return false;
  try{
    // Hent aktuel SHA
    const r1 = await fetch(API_URL, {headers:{
      'Authorization':`token ${TOKEN}`,
      'Accept':'application/vnd.github.v3+json'
    }});
    if(!r1.ok) return false;
    const meta = await r1.json();
    const sha = meta.sha;
    // Upload opdateret data
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    const r2 = await fetch(API_URL, {
      method:'PUT',
      headers:{
        'Authorization':`token ${TOKEN}`,
        'Accept':'application/vnd.github.v3+json',
        'Content-Type':'application/json'
      },
      body: JSON.stringify({message:'Deltager svar', content, sha})
    });
    return r2.ok || r2.status===200 || r2.status===201;
  }catch(e){return false;}
}

async function start(){
  const params=new URLSearchParams(window.location.search);
  const kode=params.get('kode')||params.get('sf_kode');
  const app=document.getElementById('app');

  if(!kode){
    app.innerHTML=`<div class="card err"><div class="err-icon">&#9940;</div><h3 style="margin-bottom:8px">Ingen fors&#248;gskode</h3><p style="color:var(--mut);font-size:.9rem;line-height:1.7">Scan QR-koden igen, eller bed din fors&#248;gsleder om linket.</p></div>`;
    return;
  }

  const ok = await hentFraGitHub();
  if(!ok||!allData||!allData.forsog){
    app.innerHTML=`<div class="card err"><div class="err-icon">&#128274;</div><h3 style="margin-bottom:8px">Kunne ikke hente data</h3><p style="color:var(--mut);font-size:.9rem;line-height:1.7">Pr&#248;v at genindl&#230;se siden. Hvis problemet forts&#230;tter, bed din fors&#248;gsleder om hj&#230;lp.</p><button class="btn btn-p" style="margin-top:14px" onclick="location.reload()">Pr&#248;v igen</button></div>`;
    return;
  }

  forsog=allData.forsog.find(f=>f.qrKode===kode);
  if(!forsog){
    app.innerHTML=`<div class="card err"><div class="err-icon">&#10067;</div><h3 style="margin-bottom:8px">Fors&#248;g ikke fundet</h3><p style="color:var(--mut);font-size:.9rem;line-height:1.7">Koden <strong>${kode}</strong> matcher ikke et aktivt fors&#248;g. Pr&#248;v at scanne igen.</p></div>`;
    return;
  }

  visSamtykke();
}

function visSamtykke(){
  const f=forsog;
  document.getElementById('app').innerHTML=`
    <div class="card">
      <h2 style="font-size:1.15rem;font-weight:700;margin-bottom:6px">${esc(f.navn)}</h2>
      <p style="font-size:.84rem;color:var(--mut);margin-bottom:14px">${esc(f.panel||'')}${f.produkter?' &mdash; '+f.produkter.length+' produkter':''}</p>
      <div class="info-box">
        <strong>Information &amp; samtykke</strong><br>
        Du deltager i et sensorisk fors&#248;g. Alle pr&#248;ver er blindkodet med 3-cifrede tal. Dine svar er anonyme og bruges kun til dette fors&#248;g.<br>
        ${f.mundren&&f.mundren.length?`<br><strong>Mundrens:</strong> ${f.mundren.join(', ')}`:''}
      </div>
      ${f.formal?`<p style="font-size:.84rem;color:var(--mut);margin-bottom:14px;line-height:1.6">${esc(f.formal)}</p>`:''}
      <div class="btn-row">
        <button class="btn btn-p" onclick="begyndTest()">Jeg giver samtykke og starter &#8594;</button>
      </div>
    </div>`;
}

function begyndTest(){
  const rkf=shuf([...forsog.produkter]);
  deltager={id:'Del-'+Date.now().toString(36).slice(-4).toUpperCase(),raekkefolge:rkf,fuldfort:false,tidspunkt:null,svar:{}};
  ci=0;ts={};vP=null;
  if(forsog.testtyper.includes('ranking')){visRanking();return;}
  visProve();
}

function iTS(kode){
  if(!ts[kode])ts[kode]={liking:null,cata:[],rata:{},jar:{},triangle:null,kommentar:''};
  (forsog.jar||[]).forEach(j=>{if(ts[kode].jar[j]==null)ts[kode].jar[j]=null;});
  (forsog.rata||[]).forEach(r=>{if(ts[kode].rata[r]==null)ts[kode].rata[r]=0;});
}

function visProve(){
  const f=forsog;
  if(ci>=f.produkter.length){
    if(f.testtyper.includes('preference')){visPref();return;}
    visFaerdig();return;
  }
  const p=deltager.raekkefolge[ci];
  const prog=Math.round(ci/f.produkter.length*100);
  iTS(p.kode);

  let h=`<div class="card">
    <div class="pbar"><div class="pfill" style="width:${prog}%"></div></div>
    <div style="text-align:center;font-size:.75rem;color:var(--mut);margin-bottom:4px">Pr&#248;ve ${ci+1} af ${f.produkter.length}</div>
    <div class="scode">${p.kode}</div>
    <div class="slbl">Smag p&#229; pr&#248;ve <strong>${p.kode}</strong> og besvar nedenst&#229;ende</div>`;

  if(f.testtyper.includes('liking')){
    const val=ts[p.kode].liking;
    h+=`<span class="stit">Overordnet vurdering &mdash; liking</span>
    <div class="scr" id="sc-r">${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="scb ${val===n?'on':''}" onclick="sLk('${p.kode}',${n})">${n}</button>`).join('')}</div>
    <div class="sclb"><span>1 = Kan slet ikke lide</span><span>9 = Kan rigtig godt lide</span></div>
    <div class="lk-fb" id="lk-fb">${val?`<div class="lk-badge">&#10003; Du valgte ${val} &mdash; ${LBL[val]}</div>`:'<span style="font-size:.8rem;color:var(--mut)">V&#230;lg et tal</span>'}</div>`;
  }

  if(f.testtyper.includes('cata')&&(f.cata||[]).length){
    h+=`<span class="stit">CATA &mdash; s&#230;t kryds ved alt der passer</span>
    <div class="cata-grid" id="cata-g">${(f.cata||[]).map(e=>`<div class="chip ${ts[p.kode].cata.includes(e)?'on':''}" onclick="sCata('${p.kode}','${e.replace(/'/g,"\\'")}')">${esc(e)}</div>`).join('')}</div>`;
  }

  if(f.testtyper.includes('rata')&&(f.rata||[]).length){
    h+=`<span class="stit">RATA &mdash; bed&#248;m intensitet (0&ndash;10)</span><div style="display:flex;flex-direction:column;gap:10px;margin-bottom:18px">`;
    (f.rata||[]).forEach(attr=>{const v=ts[p.kode].rata[attr]||0;h+=`<div style="display:flex;align-items:center;gap:10px"><label style="min-width:90px;text-transform:none;letter-spacing:0;font-size:.84rem;margin:0">${esc(attr)}</label><input type="range" min="0" max="10" step="1" value="${v}" style="flex:1;accent-color:var(--acc)" oninput="sRata('${p.kode}','${attr.replace(/'/g,"\\'")}',+this.value);this.nextElementSibling.textContent=this.value"><span style="min-width:28px;text-align:right;font-weight:600;color:var(--acc)">${v}</span></div>`;});
    h+=`</div>`;
  }

  if(f.testtyper.includes('jar')&&(f.jar||[]).length){
    (f.jar||[]).forEach(j=>{
      h+=`<span class="stit">JAR &mdash; ${esc(j)}</span><div class="jr">`;
      JL.forEach((lab,idx)=>{const sel=ts[p.kode].jar[j]===idx;const cls=sel?(idx<2?'jlo':idx===2?'jja':'jhi'):'';h+=`<button class="jb ${cls}" onclick="sJar('${p.kode}','${j.replace(/'/g,"\\'")}',${idx})">${lab}</button>`;});
      h+=`</div><div class="jlb"><span>&#9664; For lidt</span><span>Passende &#9654;</span></div>`;
    });
  }

  if(f.testtyper.includes('kommentar')){
    h+=`<span class="stit">Kommentar (valgfrit)</span><textarea placeholder="Eventuelle bem&#230;rkninger..." oninput="ts['${p.kode}'].kommentar=this.value">${ts[p.kode].kommentar||''}</textarea>`;
  }

  const erSidste=ci>=f.produkter.length-1;
  h+=`<div class="btn-row">
    ${ci>0?`<button class="btn btn-o" style="flex:.4" onclick="ci--;visProve()">&#8592;</button>`:''}
    <button class="btn btn-p" onclick="naesteProve('${p.kode}')">${erSidste?(f.testtyper.includes('preference')?'Pr&#230;ference &#8594;':'Afslut &#10003;'):'N&#230;ste &#8594;'}</button>
  </div></div>`;

  document.getElementById('app').innerHTML=h;
  window.scrollTo(0,0);
}

function sLk(kode,n){
  ts[kode].liking=n;
  document.querySelectorAll('#sc-r .scb').forEach((b,i)=>b.classList.toggle('on',i+1===n));
  const fb=document.getElementById('lk-fb');
  if(fb)fb.innerHTML=`<div class="lk-badge">&#10003; Du valgte ${n} &mdash; ${LBL[n]}</div>`;
}
function sCata(kode,e){const a=ts[kode].cata;const i=a.indexOf(e);if(i===-1)a.push(e);else a.splice(i,1);document.querySelectorAll('#cata-g .chip').forEach(c=>c.classList.toggle('on',a.includes(c.textContent.trim())));}
function sRata(kode,attr,v){ts[kode].rata[attr]=v;}
function sJar(kode,j,idx){ts[kode].jar[j]=idx;visProve();}

async function naesteProve(kode){
  if(forsog.testtyper.includes('liking')&&ts[kode].liking===null){alert('Angiv venligst din liking-vurdering (1\u20139).');return;}
  gemSvar(kode);
  ci++;
  const erFaerdig=ci>=forsog.produkter.length;
  if(!erFaerdig&&forsog.mundren?.length>0){
    visMundrens(()=>{
      if(erFaerdig){if(forsog.testtyper.includes('preference')){visPref();return;}visFaerdig();}
      else visProve();
    });
  } else {
    if(erFaerdig){if(forsog.testtyper.includes('preference')){visPref();return;}visFaerdig();}
    else visProve();
  }
}

function gemSvar(kode){
  const s={forsogId:forsog.id,deltager:deltager.id,proveKode:kode,produkt:(forsog.produkter.find(p=>p.kode===kode)||{}).navn,raekkefolgeNr:ci+1,liking:ts[kode].liking,cata:[...(ts[kode].cata||[])],rata:{...(ts[kode].rata||{})},jar:{...(ts[kode].jar||{})},triangle:ts[kode].triangle,kommentar:ts[kode].kommentar||'',tidspunkt:new Date().toISOString()};
  deltager.svar[kode]=s;
}

function visMundrens(callback){
  pendingNext=callback;
  document.getElementById('mr-chips').innerHTML=(forsog.mundren||[]).map(m=>`<div class="mr-chip">${esc(m)}</div>`).join('');
  document.getElementById('mr-ov').classList.add('on');
}
function lukMundrens(){document.getElementById('mr-ov').classList.remove('on');if(pendingNext){pendingNext();pendingNext=null;}}

function visRanking(){
  document.getElementById('app').innerHTML=`<div class="card">
    <div class="pbar"><div class="pfill" style="width:10%"></div></div>
    <h3 style="margin-bottom:6px">Rangordning</h3>
    <p style="font-size:.85rem;color:var(--mut);margin-bottom:16px;line-height:1.6">Ranger produkterne fra bedst (1) til d&#229;rligst (${forsog.produkter.length}).</p>
    <div>${deltager.raekkefolge.map(p=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--brd)"><div style="font-size:1.6rem;font-weight:700;color:var(--acc);width:52px;text-align:center">${p.kode}</div><input type="number" min="1" max="${forsog.produkter.length}" placeholder="Rang" style="width:70px;padding:9px;text-align:center;font-size:1.1rem;font-weight:600;border:1.5px solid var(--brd);border-radius:8px;background:var(--surf2);color:var(--txt);outline:none;margin:0" id="rank-${p.kode}"></div>`).join('')}</div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn btn-p" onclick="gemRanking()">Gem rangordning &#8594;</button>
    </div>
  </div>`;
  window.scrollTo(0,0);
}

function gemRanking(){
  forsog.produkter.forEach(p=>{const v=+document.getElementById('rank-'+p.kode)?.value;if(v){deltager.svar[p.kode]={forsogId:forsog.id,deltager:deltager.id,proveKode:p.kode,produkt:p.navn,raekkefolgeNr:0,liking:null,cata:[],rata:{},jar:{},ranking:v,kommentar:'',tidspunkt:new Date().toISOString()};}});
  if(forsog.testtyper.includes('preference')){visPref();return;}
  visFaerdig();
}

function visPref(){
  document.getElementById('app').innerHTML=`<div class="card">
    <div class="pbar"><div class="pfill" style="width:95%"></div></div>
    <h3 style="margin-bottom:6px">Samlet pr&#230;ference</h3>
    <p style="font-size:.85rem;color:var(--mut);margin-bottom:14px">Hvilket produkt foretr&#230;kker du samlet set?</p>
    ${deltager.raekkefolge.map(p=>`<button class="pb-opt ${vP===p.kode?'on':''}" onclick="vP='${p.kode}';document.querySelectorAll('.pb-opt').forEach(b=>b.classList.remove('on'));this.classList.add('on')"><strong style="font-size:1.3rem;color:var(--acc);margin-right:10px">${p.kode}</strong>Pr&#248;ve ${p.kode}</button>`).join('')}
    <div class="btn-row" style="margin-top:6px">
      <button class="btn btn-p" onclick="gemPref()">Afslut test &#10003;</button>
    </div>
  </div>`;
  window.scrollTo(0,0);
}

function gemPref(){
  if(!vP){alert('V&#230;lg venligst et produkt.');return;}
  deltager.svar['PREFERENCE']={forsogId:forsog.id,deltager:deltager.id,proveKode:'PREFERENCE',preference:vP,tidspunkt:new Date().toISOString()};
  visFaerdig();
}

async function visFaerdig(){
  deltager.fuldfort=true;
  deltager.tidspunkt=new Date().toLocaleString('da-DK');

  // Gem til GitHub
  document.getElementById('app').innerHTML=`<div class="card" style="text-align:center;padding:28px"><div class="spin"></div><br><p style="color:var(--mut)">Gemmer dine svar...</p></div>`;

  // Opdater allData med deltager og svar
  const fi = allData.forsog.findIndex(f=>f.id===forsog.id);
  if(fi>=0){
    allData.forsog[fi].deltagere = allData.forsog[fi].deltagere || [];
    allData.forsog[fi].deltagere.push(deltager);
    // Tilfoej svar
    if(!allData.svar) allData.svar=[];
    Object.values(deltager.svar).forEach(s=>allData.svar.push({...s,id:Date.now()+Math.random()}));
  }

  const gemt = await gemTilGitHub(allData);

  document.getElementById('app').innerHTML=`<div class="card" style="text-align:center;padding:32px 20px">
    <div style="font-size:4rem;margin-bottom:12px">&#10004;</div>
    <h3 style="margin-bottom:6px;font-size:1.2rem">Tak for din deltagelse!</h3>
    <p style="font-size:.9rem;color:var(--mut);margin-bottom:16px;line-height:1.6">Du har besvaret alle ${forsog.produkter.length} pr&#248;ver.${gemt?' Dine svar er gemt og synlige for fors&#248;gslederen.':' Dine svar er registreret.'}</p>
    <div class="done-rows">
      ${deltager.raekkefolge.map(p=>`<div class="done-row"><span>Pr&#248;ve <strong>${p.kode}</strong></span>${deltager.svar[p.kode]?.liking?`<span style="color:var(--mut);font-size:.82rem">Liking: <strong>${deltager.svar[p.kode].liking}/9</strong></span>`:''}<span class="badge-ok">&#10003; Gemt</span></div>`).join('')}
    </div>
    <p style="font-size:.82rem;color:var(--mut);line-height:1.6">Du kan nu lukke denne side.</p>
  </div>`;
  window.scrollTo(0,0);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

start();
</script>
</body>
</html>
